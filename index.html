<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보존식 제출</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f5f5f3; min-height: 100vh; }
.app { max-width: 720px; margin: 0 auto; padding: 1rem; }
.header { padding: 1.25rem 0 0.5rem; margin-bottom: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.header p { font-size: 13px; color: #888; margin-top: 3px; }
.tab-bar { display: flex; border-bottom: 1px solid #e0e0e0; margin-bottom: 1.5rem; }
.tab { padding: 10px 20px; font-size: 14px; font-weight: 400; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; transition: color 0.15s; }
.tab.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
label.field-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.required { color: #e24b4a; margin-left: 2px; }
.form-group { margin-bottom: 1.25rem; }
.two-col { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 10px; margin-bottom: 1.25rem; }
select, input[type="date"] { width: 100%; height: 40px; padding: 0 12px; font-size: 14px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; -webkit-appearance: none; appearance: none; }
select:focus, input:focus { outline: none; border-color: #1a1a1a; }
select:disabled { opacity: 0.4; cursor: not-allowed; background: #fafafa; }
.sub-hint { font-size: 12px; color: #aaa; margin-top: 5px; }
.meals-label { font-size: 13px; color: #666; font-weight: 500; margin-bottom: 10px; }
.meal-empty-hint { font-size: 13px; color: #bbb; padding: 14px 0; }
.meal-row { border: 1px solid #e8e8e8; border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; background: #fff; }
.meal-row.submitted { border-color: #1D9E75; }
.meal-row-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; gap: 10px; cursor: pointer; background: #fff; user-select: none; }
.meal-row-header:hover { background: #fafafa; }
.meal-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.meal-name { font-size: 14px; font-weight: 500; color: #1a1a1a; white-space: nowrap; }
.photo-pill { font-size: 12px; color: #aaa; white-space: nowrap; }
.badge-done { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 99px; background: #E1F5EE; color: #0F6E56; white-space: nowrap; flex-shrink: 0; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
.meal-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.btn-edit { padding: 5px 11px; font-size: 12px; font-weight: 500; border: 1px solid #e0e0e0; border-radius: 6px; background: #fafafa; color: #666; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-edit:hover { background: #f0f0f0; }
.chevron { width: 16px; height: 16px; stroke: #bbb; fill: none; stroke-width: 2; flex-shrink: 0; transition: transform 0.2s; }
.meal-row.open .chevron { transform: rotate(180deg); }
.meal-panel { display: none; padding: 0 14px 14px; background: #fff; border-top: 1px solid #f0f0f0; }
.meal-row.open .meal-panel { display: block; }
.panel-actions { display: flex; gap: 8px; padding-top: 12px; flex-wrap: wrap; }
.btn-upload { display: flex; align-items: center; gap: 5px; padding: 7px 12px; font-size: 13px; font-weight: 500; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; color: #666; cursor: pointer; font-family: inherit; white-space: nowrap; position: relative; overflow: hidden; }
.btn-upload:hover { background: #f0f0f0; }
.btn-upload.has-photos { border-color: #1a1a1a; color: #1a1a1a; background: #fff; }
.btn-upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
.upload-icon-sm { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }
.btn-submit-meal { padding: 7px 16px; font-size: 13px; font-weight: 500; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-submit-meal:hover { opacity: 0.8; }
.btn-cancel { padding: 7px 12px; font-size: 13px; font-weight: 500; border: 1px solid #e0e0e0; border-radius: 8px; background: none; color: #666; cursor: pointer; font-family: inherit; }
.photo-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-top: 12px; }
.photo-thumb { aspect-ratio: 1; border-radius: 8px; border: 1px solid #e8e8e8; overflow: hidden; position: relative; background: #f5f5f3; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-del { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.55); border: none; cursor: pointer; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; }
.admin-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: flex-end; }
.admin-controls input[type="date"] { width: auto; flex: 1; min-width: 130px; max-width: 180px; }
.admin-controls select { width: auto; flex: 1; min-width: 130px; max-width: 200px; }
.btn-filter { padding: 0 14px; height: 40px; font-size: 13px; font-weight: 500; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; white-space: nowrap; font-family: inherit; color: #1a1a1a; }
.btn-filter:hover { background: #f5f5f3; }
.grid-wrap { overflow-x: auto; border: 1px solid #e8e8e8; border-radius: 10px; background: #fff; }
table.admin-grid { border-collapse: collapse; font-size: 12px; min-width: 100%; }
.admin-grid th, .admin-grid td { border-right: 0.5px solid #e8e8e8; border-bottom: 0.5px solid #e8e8e8; text-align: center; white-space: nowrap; }
.admin-grid th:last-child, .admin-grid td:last-child { border-right: none; }
.admin-grid tr:last-child td { border-bottom: none; }
.admin-grid .date-sep { border-left: 2px solid #d0d0d0; }
th.th-date { padding: 6px 8px; font-size: 11px; font-weight: 500; color: #888; background: #fafafa; }
th.th-meal { padding: 5px 8px; font-size: 11px; font-weight: 400; color: #999; background: #fafafa; min-width: 48px; }
th.th-site { padding: 8px 14px; font-size: 12px; font-weight: 500; color: #1a1a1a; background: #fafafa; text-align: left; position: sticky; left: 0; z-index: 2; min-width: 130px; }
td.td-site { padding: 0 14px; height: 30px; font-size: 12px; color: #1a1a1a; text-align: left; background: #fff; position: sticky; left: 0; z-index: 1; border-right: 1px solid #e8e8e8; }
td.cell { height: 30px; min-width: 48px; cursor: default; position: relative; }
td.cell-gray { background: #f0f0ee; }
td.cell-o { background: #5DCAA5; cursor: pointer; }
td.cell-o:hover { background: #1D9E75; }
td.cell-x { background: #fff; }
.cell-symbol { font-size: 12px; font-weight: 500; }
.cell-o .cell-symbol { color: #085041; }
.cell-x .cell-symbol { color: #ccc; }
.hover-preview { display: none; position: fixed; z-index: 999; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 8px; pointer-events: none; max-width: 240px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.hover-preview.visible { display: block; }
.preview-photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.preview-img { width: 68px; height: 68px; border-radius: 4px; object-fit: cover; }
.preview-label { font-size: 11px; color: #888; margin-bottom: 6px; text-align: center; }
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.88); z-index: 500; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.loading-overlay.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 2.5px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #666; }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 11px 20px; border-radius: 99px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.error { background: #e24b4a; }
.empty-state { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>보존식 제출</h1>
    <p>매니저 전용 보존식 사진 제출 시스템</p>
  </div>
  <div class="tab-bar">

    <button class="tab" onclick="switchTab('admin')">관리자</button>
  </div>
  <div class="section active" id="sec-submit">
    <div class="two-col">
      <div>
        <label class="field-label">매니저 이름 <span class="required">*</span></label>
        <select id="manager-select" onchange="onManagerChange()"><option value="">매니저를 선택하세요</option></select>
      </div>
      <div>

    <div class="form-group">
      <label class="field-label">사업장 <span class="required">*</span></label>
      <select id="site-select" disabled onchange="onSiteChange()"><option value="">먼저 매니저를 선택하세요</option></select>
      <div class="sub-hint" id="site-hint"></div>
    </div>
    <div class="form-group">
      <div class="meals-label">끼니별 사진 제출 <span class="required">*</span></div>
      <div id="meal-rows"><div class="meal-empty-hint">사업장을 선택하면 해당 날짜의 끼니가 표시됩니다</div></div>
    </div>
  </div>
  <div class="section" id="sec-admin">
    <div class="admin-controls">
      <input type="date" id="admin-from" />
      <span style="font-size:13px;color:#bbb;line-height:40px;">~</span>
      <input type="date" id="admin-to" />
      <select id="admin-manager"><option value="">전체 매니저</option></select>
      <button class="btn-filter" onclick="loadAdminData()">조회</button>
      <button class="btn-filter" onclick="resetAdmin()">초기화</button>
    </div>
    <div class="grid-wrap" id="grid-wrap">
      <div class="empty-state">날짜를 선택하고 조회해주세요</div>
    </div>
  </div>
</div>
<div class="hover-preview" id="hover-preview">
  <div class="preview-label" id="preview-label"></div>
  <div class="preview-photos" id="preview-photos"></div>
</div>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중...</div>
</div>
<div class="toast" id="toast"></div>

const ALL_MEALS = ['조식','중식','석식','야식'];

const todayStr = new Date().toISOString().split('T')[0];
document.getElementById('date-input').value = todayStr;
document.getElementById('admin-from').value = todayStr;
document.getElementById('admin-to').value = todayStr;

function getDayType(d){const day=new Date(d).getDay();return day===6?'토요일':day===0?'일요일':'평일';}
function getMeals(site,date){return(SITE_MEALS[site]&&SITE_MEALS[site][getDayType(date)])||[];}
function getState(site,date,meal){
  if(!mealState[site])mealState[site]={};
  if(!mealState[site][date])mealState[site][date]={};
  if(!mealState[site][date][meal])mealState[site][date][meal]={photos:[],submitted:false,docId:null};
  return mealState[site][date][meal];
}
function cSite(){return document.getElementById('site-select').value;}
function cDate(){return document.getElementById('date-input').value;}
function cMgr(){return document.getElementById('manager-select').value;}
function esc(s){return s.replace(/[^a-zA-Z0-9가-힣]/g,'_');}
function showLoading(msg){document.getElementById('loading-text').textContent=msg||'처리 중...';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
function showToast(msg,isError){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// 초기화
(function init(){
  const mSel=document.getElementById('manager-select'),aMgr=document.getElementById('admin-manager');
  MANAGERS.forEach(m=>{mSel.appendChild(new Option(m.name,m.name));aMgr.appendChild(new Option(m.name,m.name));});
})();

// 제출 상태 로드 (새로고침해도 유지)
async function loadSubmitState(site, date, manager) {
  try {
    const q = query(collection(db,'submissions'),
      where('site','==',site), where('date','==',date), where('manager','==',manager));
    const snap = await getDocs(q);
    snap.forEach(d => {
      const data = d.data();
      const st = getState(site, date, data.meal);
      st.submitted = true;
      st.docId = d.id;
      st.photoURLs = data.photoURLs || [];
      st.photos = data.photoURLs.map(url=>({preview:url, url}));
    });
  } catch(e){ console.error(e); }
}

function onManagerChange(){
  const name=cMgr(),siteSel=document.getElementById('site-select'),hint=document.getElementById('site-hint');
  openRows.clear();editingMeals.clear();siteSel.innerHTML='';
  if(!name){siteSel.appendChild(new Option('먼저 매니저를 선택하세요',''));siteSel.disabled=true;hint.textContent='';renderMealRows([]);return;}
  const mgr=MANAGERS.find(m=>m.name===name);
  siteSel.disabled=false;
  if(mgr.sites.length>1)siteSel.appendChild(new Option('사업장을 선택하세요',''));
  mgr.sites.forEach(s=>siteSel.appendChild(new Option(s,s)));
  if(mgr.sites.length===1){siteSel.value=mgr.sites[0];hint.textContent='담당 사업장 1곳';onSiteChange();}
  else{hint.textContent=`담당 사업장 ${mgr.sites.length}곳`;renderMealRows([]);}
}

async function onSiteChange(){
  openRows.clear();editingMeals.clear();
  const site=cSite(),date=cDate(),mgr=cMgr();
  if(!site){renderMealRows([]);return;}
  if(mgr){showLoading('불러오는 중...');await loadSubmitState(site,date,mgr);hideLoading();}
  renderMealRows(getMeals(site,date));
}

async function onDateChange(){
  openRows.clear();editingMeals.clear();
  const site=cSite(),date=cDate(),mgr=cMgr();
  if(!site)return;
  if(mgr){showLoading('불러오는 중...');await loadSubmitState(site,date,mgr);hideLoading();}
  renderMealRows(getMeals(site,date));
}

function toggleRow(meal){
  const id=esc(meal),row=document.getElementById('row-'+id);if(!row)return;
  if(openRows.has(meal)){openRows.delete(meal);row.classList.remove('open');}
  else{openRows.add(meal);row.classList.add('open');}
}

function renderMealRows(meals){
  const c=document.getElementById('meal-rows');
  if(!meals.length){c.innerHTML='<div class="meal-empty-hint">사업장을 선택하면 해당 날짜의 끼니가 표시됩니다</div>';return;}
  c.innerHTML=meals.map(m=>buildMealRow(m)).join('');
}

function buildMealRow(meal){
  const site=cSite(),date=cDate(),st=getState(site,date,meal),id=esc(meal);
  const isEditing=editingMeals.has(meal),isOpen=openRows.has(meal);
  let right='';
  if(st.submitted&&!isEditing) right=`<span class="badge-done"><span class="badge-dot"></span>제출완료</span><button class="btn-edit" onclick="event.stopPropagation();startEdit('${meal}')">수정</button>`;
  const pill=st.submitted&&!isEditing?`<span class="photo-pill">${st.photos.length}장</span>`:'';
  let panel='';
  if(!st.submitted||isEditing){
    const bc=st.photos.length?'btn-upload has-photos':'btn-upload',bl=st.photos.length?`${st.photos.length}장 첨부됨`:'사진 추가';
    panel=`<div class="panel-actions"><label class="${bc}"><svg class="upload-icon-sm" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg><span>${bl}</span><input type="file" accept="image/*" multiple onchange="handleFiles(this,'${meal}')"/></label>${st.photos.length?`<button class="btn-submit-meal" onclick="submitMeal('${meal}')">제출</button>`:''}${isEditing?`<button class="btn-cancel" onclick="cancelEdit('${meal}')">취소</button>`:''}</div>`;
  }
  const photos=st.photos.length?`<div class="photo-grid">${st.photos.map((p,i)=>`<div class="photo-thumb"><img src="${p.preview}"/>${(!st.submitted||isEditing)?`<button class="photo-del" onclick="removePhoto('${meal}',${i})">✕</button>`:''}</div>`).join('')}</div>`:'';
  return `<div class="meal-row${st.submitted&&!isEditing?' submitted':''}${isOpen?' open':''}" id="row-${id}"><div class="meal-row-header" onclick="toggleRow('${meal}')"><div class="meal-left"><span class="meal-name">${meal}</span>${pill}</div><div class="meal-right">${right}<svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div></div><div class="meal-panel">${panel}${photos}</div></div>`;
}

function refreshRow(meal){const id=esc(meal),el=document.getElementById('row-'+id);if(!el)return;const t=document.createElement('div');t.innerHTML=buildMealRow(meal);el.replaceWith(t.firstElementChild);}

function handleFiles(input,meal){
  const site=cSite(),date=cDate(),st=getState(site,date,meal);
  const files=Array.from(input.files).slice(0,10-st.photos.length);
  let loaded=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{st.photos.push({preview:e.target.result,file:f});loaded++;if(loaded===files.length)refreshRow(meal);};
    r.readAsDataURL(f);
  });
  input.value='';
}
function removePhoto(meal,idx){const st=getState(cSite(),cDate(),meal);st.photos.splice(idx,1);refreshRow(meal);}

async function submitMeal(meal){
  const site=cSite(),date=cDate(),manager=cMgr();
  if(!manager){showToast('매니저를 먼저 선택해주세요',true);return;}
  const st=getState(site,date,meal);
  if(!st.photos.length){showToast('사진을 먼저 첨부해주세요',true);return;}

  showLoading(`${meal} 제출 중... (${st.photos.length}장)`);
  try {
    // 1. Storage에 사진 업로드
    const photoURLs = [];
    for(let i=0; i<st.photos.length; i++){
      const p = st.photos[i];
      if(p.url){ photoURLs.push(p.url); continue; } // 이미 업로드된 사진
      const path = `submissions/${date}/${site}/${meal}/${Date.now()}_${i}.jpg`;
      const storageRef = ref(storage, path);
      const blob = await fetch(p.preview).then(r=>r.blob());
      await uploadBytes(storageRef, blob);
      const url = await getDownloadURL(storageRef);
      photoURLs.push(url);
    }

    // 2. Firestore에 기록
    const docId = `${manager}_${site}_${date}_${meal}`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
    await setDoc(doc(db,'submissions',docId),{
      manager, site, date, meal,
      photoURLs,
      submittedAt: new Date().toISOString()
    });

    st.submitted = true;
    st.docId = docId;
    st.photoURLs = photoURLs;
    st.photos = photoURLs.map(url=>({preview:url, url}));
    editingMeals.delete(meal);
    openRows.delete(meal);
    refreshRow(meal);
    showToast(`${meal} 제출 완료!`);
  } catch(e){
    console.error(e);
    showToast('제출 실패: '+e.message, true);
  }
  hideLoading();
}

function startEdit(meal){editingMeals.add(meal);openRows.add(meal);refreshRow(meal);}
function cancelEdit(meal){editingMeals.delete(meal);openRows.delete(meal);refreshRow(meal);}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='submit')||(i===1&&tab==='admin')));
  document.getElementById('sec-submit').classList.toggle('active',tab==='submit');
  document.getElementById('sec-admin').classList.toggle('active',tab==='admin');
}

function resetAdmin(){
  document.getElementById('admin-from').value=todayStr;
  document.getElementById('admin-to').value=todayStr;
  document.getElementById('admin-manager').value='';
  document.getElementById('grid-wrap').innerHTML='<div class="empty-state">날짜를 선택하고 조회해주세요</div>';
}

async function loadAdminData(){
  const from=document.getElementById('admin-from').value,to=document.getElementById('admin-to').value;
  if(!from||!to){showToast('날짜를 선택해주세요',true);return;}
  showLoading('데이터 불러오는 중...');
  try {
    const q=query(collection(db,'submissions'),where('date','>=',from),where('date','<=',to));
    const snap=await getDocs(q);
    adminRecords=[];
    snap.forEach(d=>adminRecords.push(d.data()));
    renderAdminGrid();
  } catch(e){
    showToast('조회 실패: '+e.message,true);
  }
  hideLoading();
}

function getDates(from,to){const d=[],c=new Date(from),e=new Date(to);while(c<=e){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}

function renderAdminGrid(){
  const from=document.getElementById('admin-from').value,to=document.getElementById('admin-to').value;
  const mf=document.getElementById('admin-manager').value,wrap=document.getElementById('grid-wrap');
  const dates=getDates(from,to);
  const cols=[];dates.forEach(d=>ALL_MEALS.forEach(m=>cols.push({date:d,meal:m})));
  let sites=ALL_SITES;
  if(mf){const mg=MANAGERS.find(m=>m.name===mf);sites=mg?mg.sites:[];}

  const recMap={};
  adminRecords.forEach(r=>{
    const key=`${r.site}|${r.date}|${r.meal}`;
    recMap[key]=r.photoURLs||[];
  });

  let html='<table class="admin-grid"><thead><tr><th class="th-site" rowspan="2">사업장</th>';
  dates.forEach((d,di)=>html+=`<th class="th-date${di>0?' date-sep':''}" colspan="${ALL_MEALS.length}">${d}</th>`);
  html+='</tr><tr>';
  dates.forEach((d,di)=>ALL_MEALS.forEach((m,mi)=>html+=`<th class="th-meal${mi===0&&di>0?' date-sep':''}">${m}</th>`));
  html+='</tr></thead><tbody>';
  sites.forEach(site=>{
    html+=`<tr><td class="td-site">${site}</td>`;
    cols.forEach((col,ci)=>{
      const sep=ALL_MEALS.indexOf(col.meal)===0&&ci>0?' date-sep':'';
      const meals=getMeals(site,col.date);
      if(!meals.includes(col.meal)){html+=`<td class="cell cell-gray${sep}"></td>`;return;}
      const key=`${site}|${col.date}|${col.meal}`;
      const urls=recMap[key];
      if(urls&&urls.length){
        html+=`<td class="cell cell-o${sep}" data-key="${key}" onmouseenter="showPreview(event,'${key}')" onmouseleave="hidePreview()"><span class="cell-symbol">O</span></td>`;
      } else {
        html+=`<td class="cell cell-x${sep}"><span class="cell-symbol">X</span></td>`;
      }
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

const prevEl=document.getElementById('hover-preview'),prevPhotos=document.getElementById('preview-photos'),prevLabel=document.getElementById('preview-label');
function showPreview(e,key){
  const recMap={};
  adminRecords.forEach(r=>{recMap[`${r.site}|${r.date}|${r.meal}`]=r.photoURLs||[];});
  const urls=recMap[key]||[];if(!urls.length)return;
  const parts=key.split('|');
  prevLabel.textContent=`${parts[0]} · ${parts[2]}`;
  prevPhotos.innerHTML=urls.slice(0,6).map(url=>`<img class="preview-img" src="${url}" onerror="this.style.display='none'"/>`).join('');
  prevEl.classList.add('visible');movePreview(e);
}
function movePreview(e){const pw=256,ph=160;let x=e.clientX+12,y=e.clientY+12;if(x+pw>window.innerWidth)x=e.clientX-pw-8;if(y+ph>window.innerHeight)y=e.clientY-ph-8;prevEl.style.left=x+'px';prevEl.style.top=y+'px';}
document.addEventListener('mousemove',e=>{if(prevEl.classList.contains('visible'))movePreview(e);});
function hidePreview(){prevEl.classList.remove('visible');}

// 전역 함수로 등록
window.onManagerChange=onManagerChange;
window.onSiteChange=onSiteChange;
window.onDateChange=onDateChange;
window.toggleRow=toggleRow;
window.handleFiles=handleFiles;
window.removePhoto=removePhoto;
window.submitMeal=submitMeal;
window.startEdit=startEdit;
window.cancelEdit=cancelEdit;
window.switchTab=switchTab;
window.loadAdminData=loadAdminData;
window.resetAdmin=resetAdmin;
window.showPreview=showPreview;
window.hidePreview=hidePreview;
</script>
</body>
</html>
