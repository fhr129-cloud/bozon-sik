<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보존식 제출</title>
<style>
:root {
  --bg:#f5f5f3;--bg2:#fff;--bg3:#fafafa;
  --border:#e0e0e0;--border2:#e8e8e8;
  --text1:#1a1a1a;--text2:#666;--text3:#999;--text4:#bbb;
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --red:#e24b4a;--shadow:rgba(0,0,0,0.08);
}
.dark{
  --bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;
  --border:#333;--border2:#2a2a2a;
  --text1:#f0f0f0;--text2:#aaa;--text3:#666;--text4:#444;
  --shadow:rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);}
.app{max-width:720px;margin:0 auto;padding:1rem;padding-bottom:3rem;}

.header{padding:1.25rem 0 0.5rem;margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:center;}
.header-left h1{font-size:20px;font-weight:600;color:var(--text1);}
.header-left p{font-size:13px;color:var(--text2);margin-top:3px;}
.btn-dark{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;font-size:14px;font-weight:400;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;min-height:44px;}
.tab.active{color:var(--text1);border-bottom:2px solid var(--text1);font-weight:500;}

.section{display:none;}
.section.active{display:block;}
label.field-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.required{color:var(--red);margin-left:2px;}
.form-group{margin-bottom:1.25rem;}
.two-col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:1.25rem;}
select,input[type="date"],input[type="month"]{width:100%;height:44px;padding:0 12px;font-size:16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;appearance:none;}
select:focus,input:focus{outline:none;border-color:var(--text1);}
select:disabled{opacity:0.4;cursor:not-allowed;background:var(--bg3);}
.sub-hint{font-size:12px;color:var(--text4);margin-top:5px;}
.meals-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:10px;}
.meal-empty-hint{font-size:13px;color:var(--text4);padding:14px 0;}

/* 끼니 카드 */
.meal-row{border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;background:var(--bg2);transition:border-color 0.2s;}
.meal-row.has-photo{border-color:#aaa;}
.meal-row.submitted{border-color:var(--green);}

.meal-row-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:10px;cursor:pointer;background:var(--bg2);user-select:none;min-height:60px;}
.meal-row-header:active{background:var(--bg3);}
.meal-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1;}
.meal-name{font-size:15px;font-weight:500;color:var(--text1);white-space:nowrap;}

/* 썸네일 미리보기 (헤더 안) */
.meal-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);flex-shrink:0;}
.meal-thumb-placeholder{width:40px;height:40px;border-radius:8px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text4);}

.badge-done{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:99px;background:var(--green-light);color:var(--green-dark);white-space:nowrap;flex-shrink:0;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.meal-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-edit{padding:6px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;min-height:34px;}

.chevron{width:16px;height:16px;stroke:var(--text4);fill:none;stroke-width:2;flex-shrink:0;transition:transform 0.2s;}
.meal-row.open .chevron{transform:rotate(180deg);}
.meal-panel{display:none;padding:0 16px 16px;background:var(--bg2);border-top:1px solid var(--border2);}
.meal-row.open .meal-panel{display:block;}

/* 사진 업로드 영역 */
.photo-upload-area{margin-top:12px;}
.btn-upload{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;font-size:14px;font-weight:500;border:1.5px dashed var(--border);border-radius:10px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;position:relative;overflow:hidden;min-height:54px;}
.btn-upload.has-photo{border-style:solid;border-color:var(--text1);color:var(--text1);background:var(--bg2);}
.btn-upload input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.upload-icon-sm{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}

/* 큰 미리보기 */
.photo-preview-large{margin-top:10px;position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border2);}
.photo-preview-large img{width:100%;max-height:260px;object-fit:cover;display:block;}
.photo-del-large{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;cursor:pointer;color:white;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* 진행바 */
.upload-progress{margin-top:10px;display:none;}
.upload-progress.show{display:block;}
.progress-text{font-size:12px;color:var(--text2);margin-bottom:5px;display:flex;justify-content:space-between;}
.progress-track{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.3s;}

/* 전체 제출 버튼 */
.submit-all-wrap{position:sticky;bottom:1rem;margin-top:1rem;}
.btn-submit-all{width:100%;padding:16px;font-size:16px;font-weight:600;background:var(--text1);color:var(--bg2);border:none;border-radius:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px var(--shadow);}
.btn-submit-all:disabled{opacity:0.35;cursor:not-allowed;}
.btn-submit-all:not(:disabled):active{transform:scale(0.98);}
.submit-status{font-size:13px;color:var(--text3);text-align:center;margin-top:8px;}

/* 관리자 */
.admin-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:flex-end;}
.admin-controls input[type="date"]{width:auto;flex:1;min-width:120px;max-width:170px;}
.admin-controls select{width:auto;flex:1;min-width:120px;max-width:180px;}
.btn-filter{padding:0 14px;height:44px;font-size:14px;font-weight:500;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text1);}
.btn-download{padding:0 14px;height:44px;font-size:14px;font-weight:500;background:var(--green);border:none;border-radius:10px;cursor:pointer;white-space:nowrap;font-family:inherit;color:white;}
.btn-download:disabled{opacity:0.4;cursor:not-allowed;}
.auto-refresh-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--text2);}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.grid-wrap{overflow-x:auto;border:1px solid var(--border2);border-radius:12px;background:var(--bg2);-webkit-overflow-scrolling:touch;}
table.admin-grid{border-collapse:collapse;font-size:12px;min-width:100%;}
.admin-grid th,.admin-grid td{border-right:0.5px solid var(--border2);border-bottom:0.5px solid var(--border2);text-align:center;white-space:nowrap;}
.admin-grid th:last-child,.admin-grid td:last-child{border-right:none;}
.admin-grid tr:last-child td{border-bottom:none;}
.admin-grid .date-sep{border-left:2px solid var(--border);}
th.th-date{padding:6px 8px;font-size:11px;font-weight:500;color:var(--text2);background:var(--bg3);}
th.th-meal{padding:5px 6px;font-size:10px;font-weight:400;color:var(--text3);background:var(--bg3);min-width:44px;}
th.th-site{padding:8px 12px;font-size:12px;font-weight:500;color:var(--text1);background:var(--bg3);text-align:left;position:sticky;left:0;z-index:2;min-width:110px;}
td.td-site{padding:0 12px;height:32px;font-size:12px;color:var(--text1);text-align:left;background:var(--bg2);position:sticky;left:0;z-index:1;border-right:1px solid var(--border2);}
td.cell{height:32px;min-width:44px;}
td.cell-gray{background:var(--bg3);}
td.cell-o{background:#5DCAA5;cursor:pointer;}
td.cell-o:hover{background:var(--green);}
td.cell-x{background:var(--bg2);}
.cell-symbol{font-size:12px;font-weight:600;}
.cell-o .cell-symbol{color:#085041;}
.cell-x .cell-symbol{color:var(--text4);}

.hover-preview{display:none;position:fixed;z-index:999;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px;pointer-events:none;max-width:240px;box-shadow:0 8px 24px var(--shadow);}
.hover-preview.visible{display:block;}
.preview-photos{display:grid;grid-template-columns:1fr;gap:4px;}
.preview-img{width:200px;height:200px;border-radius:8px;object-fit:cover;}
.preview-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-align:center;font-weight:500;}

/* 통계 */
.stat-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.stat-type-btns{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.stat-type-btn{padding:10px 18px;font-size:14px;font-weight:500;border:none;background:var(--bg2);color:var(--text2);cursor:pointer;font-family:inherit;min-height:44px;}
.stat-type-btn.active{background:var(--text1);color:var(--bg2);}
.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:600;color:var(--text1);}
.stat-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.rate-bar-wrap{margin-bottom:12px;}
.rate-bar-label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px;}
.rate-bar-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.rate-bar-fill{height:100%;background:#5DCAA5;border-radius:99px;transition:width 0.5s;}

/* 히스토리 */
.history-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.history-list{display:flex;flex-direction:column;gap:8px;}
.history-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;}
.history-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.history-site{font-size:15px;font-weight:500;color:var(--text1);}
.history-date{font-size:12px;color:var(--text2);}
.history-meals{display:flex;gap:6px;flex-wrap:wrap;}
.history-meal-tag{font-size:12px;padding:4px 10px;border-radius:99px;background:var(--green-light);color:var(--green-dark);}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.dark .loading-overlay{background:rgba(0,0,0,0.75);}
.loading-overlay.show{display:flex;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--text1);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text2);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text1);color:var(--bg2);padding:12px 22px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.toast.error{background:var(--red);}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text4);font-size:14px;}

@media(max-width:480px){
  .two-col{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:repeat(3,minmax(0,1fr));}
  .stat-value{font-size:20px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>보존식 제출</h1>
      <p>매니저 전용 보존식 사진 제출 시스템</p>
    </div>
    <button class="btn-dark" onclick="toggleDark()" id="dark-btn">🌙</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('submit')">보존식 제출</button>
    <button class="tab" onclick="switchTab('admin')">관리자</button>
    <button class="tab" onclick="switchTab('stats')">제출률</button>
    <button class="tab" onclick="switchTab('history')">히스토리</button>
  </div>

  <!-- 제출 탭 -->
  <div class="section active" id="sec-submit">
    <div class="two-col">
      <div>
        <label class="field-label">매니저 이름 <span class="required">*</span></label>
        <select id="manager-select" onchange="onManagerChange()"><option value="">매니저를 선택하세요</option></select>
      </div>
      <div>
        <label class="field-label">날짜 <span class="required">*</span></label>
        <input type="date" id="date-input" onchange="onDateChange()" />
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">사업장 <span class="required">*</span></label>
      <select id="site-select" disabled onchange="onSiteChange()"><option value="">먼저 매니저를 선택하세요</option></select>
      <div class="sub-hint" id="site-hint"></div>
    </div>
    <div class="form-group">
      <div class="meals-label">끼니별 사진 첨부 <span class="required">*</span></div>
      <div id="meal-rows"><div class="meal-empty-hint">사업장을 선택하면 해당 날짜의 끼니가 표시됩니다</div></div>
    </div>

    <!-- 전체 제출 버튼 -->
    <div class="submit-all-wrap" id="submit-all-wrap" style="display:none;">
      <button class="btn-submit-all" id="btn-submit-all" onclick="submitAll()">
        <span id="submit-all-label">전체 제출</span>
      </button>
      <div class="submit-status" id="submit-status"></div>
    </div>
  </div>

  <!-- 관리자 탭 -->
  <div class="section" id="sec-admin">
    <div class="auto-refresh-bar">
      <div class="refresh-dot"></div>
      <span id="refresh-status">자동 새로고침 대기 중</span>
    </div>
    <div class="admin-controls">
      <input type="date" id="admin-from" />
      <span style="font-size:13px;color:var(--text4);line-height:44px;">~</span>
      <input type="date" id="admin-to" />
      <select id="admin-manager"><option value="">전체 매니저</option></select>
      <button class="btn-filter" onclick="loadAdminData()">조회</button>
      <button class="btn-filter" onclick="resetAdmin()">초기화</button>
      <button class="btn-download" id="btn-download" onclick="downloadAllPhotos()" disabled>⬇ 다운로드</button>
    </div>
    <div class="grid-wrap" id="grid-wrap">
      <div class="empty-state">날짜를 선택하고 조회해주세요</div>
    </div>
  </div>

  <!-- 제출률 탭 -->
  <div class="section" id="sec-stats">
    <div class="stat-controls">
      <div class="stat-type-btns">
        <button class="stat-type-btn active" onclick="setStatType('week')">주간</button>
        <button class="stat-type-btn" onclick="setStatType('month')">월간</button>
      </div>
      <input type="month" id="stat-month" style="max-width:160px;" />
      <button class="btn-filter" onclick="loadStats()">조회</button>
    </div>
    <div id="stat-summary" class="stat-grid"></div>
    <div id="stat-bars"></div>
  </div>

  <!-- 히스토리 탭 -->
  <div class="section" id="sec-history">
    <div class="history-controls">
      <select id="history-manager" onchange="loadHistory()" style="max-width:180px;"><option value="">매니저 선택</option></select>
      <input type="date" id="history-from" style="max-width:150px;" />
      <span style="font-size:13px;color:var(--text4);line-height:44px;">~</span>
      <input type="date" id="history-to" style="max-width:150px;" />
      <button class="btn-filter" onclick="loadHistory()">조회</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state">매니저를 선택하고 조회해주세요</div>
    </div>
  </div>
</div>

<div class="hover-preview" id="hover-preview">
  <div class="preview-label" id="preview-label"></div>
  <div class="preview-photos" id="preview-photos"></div>
</div>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중...</div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, query, where, getDocs, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyCvFuJZ6hraxohPnvtAbhvBanXzXf8VE-E",
  authDomain: "bozon-sik.firebaseapp.com",
  projectId: "bozon-sik",
  storageBucket: "bozon-sik.firebasestorage.app",
  messagingSenderId: "350003291657",
  appId: "1:350003291657:web:9ef438cc880002c11ffad8"
};
const app = initializeApp(firebaseConfig);

function compressImage(file,maxWidth=1200,quality=0.82){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(blob),'image/jpeg',quality);
    };
    img.src=url;
  });
}

    const q=query(collection(db,'submissions'),where('site','==',site),where('date','==',date),where('manager','==',manager));
    const snap=await getDocs(q);
    snap.forEach(d=>{
      const data=d.data();
      const st=getState(site,date,data.meal);
      st.submitted=true;
      st.photo={preview:(data.photoURLs||[])[0],url:(data.photoURLs||[])[0]};
    });
  }catch(e){console.error(e);}
}

function updateSubmitAllBtn(){
  const site=cSite(),date=cDate();
  if(!site||!currentMeals.length){document.getElementById('submit-all-wrap').style.display='none';return;}
  document.getElementById('submit-all-wrap').style.display='block';
  const total=currentMeals.length;
  const withPhoto=currentMeals.filter(m=>{const st=getState(site,date,m);return st.photo&&!st.submitted;}).length;
  const submitted=currentMeals.filter(m=>getState(site,date,m).submitted).length;
  const wrap=document.getElementById('submit-all-wrap');
  const btn=document.getElementById('btn-submit-all');
  const label=document.getElementById('submit-all-label');
  const status=document.getElementById('submit-status');
  wrap.style.display='block';
  if(submitted===total&&total>0){
    label.textContent='모두 제출 완료 ✓';
    btn.disabled=true;
    btn.style.opacity='0.5';
    status.textContent=`전체 ${total}개 끼니 제출 완료`;
  } else if(withPhoto>0){
    label.textContent=`${withPhoto}개 끼니 모두 제출`;
    btn.disabled=false;
    btn.style.opacity='1';
    status.textContent=`사진 첨부됨: ${withPhoto}/${total}개${submitted>0?' · 이미 제출: '+submitted+'개':''}`;
  } else {
    label.textContent='모두 제출';
    btn.disabled=true;
    btn.style.opacity='0.4';
    status.textContent='끼니 카드를 눌러 사진을 첨부해주세요';
  }
}

window.onManagerChange=async function(){
  const name=cMgr(),siteSel=document.getElementById('site-select'),hint=document.getElementById('site-hint');
  openRows.clear();editingMeals.clear();currentMeals=[];siteSel.innerHTML='';
  if(!name){siteSel.appendChild(new Option('먼저 매니저를 선택하세요',''));siteSel.disabled=true;hint.textContent='';renderMealRows([]);document.getElementById('submit-all-wrap').style.display='none';return;}
  const mgr=MANAGERS.find(m=>m.name===name);
  siteSel.disabled=false;
  if(mgr.sites.length>1)siteSel.appendChild(new Option('사업장을 선택하세요',''));
  mgr.sites.forEach(s=>siteSel.appendChild(new Option(s,s)));
  if(mgr.sites.length===1){siteSel.value=mgr.sites[0];hint.textContent='담당 사업장 1곳';await window.onSiteChange();}
  else{hint.textContent=`담당 사업장 ${mgr.sites.length}곳`;renderMealRows([]);}
};

window.onSiteChange=async function(){
  openRows.clear();editingMeals.clear();
  const site=cSite(),date=cDate(),mgr=cMgr();
  if(!site){currentMeals=[];renderMealRows([]);document.getElementById('submit-all-wrap').style.display='none';return;}
  if(mgr){showLoading('불러오는 중...');await loadSubmitState(site,date,mgr);hideLoading();}
  currentMeals=getMeals(site,date);
  renderMealRows(currentMeals);
  updateSubmitAllBtn();
};

window.onDateChange=async function(){
  openRows.clear();editingMeals.clear();
  const site=cSite(),date=cDate(),mgr=cMgr();
  if(!site)return;
  if(mgr){showLoading('불러오는 중...');await loadSubmitState(site,date,mgr);hideLoading();}
  currentMeals=getMeals(site,date);
  renderMealRows(currentMeals);
  updateSubmitAllBtn();
};

window.toggleRow=function(meal){
  const id=esc(meal),row=document.getElementById('row-'+id);if(!row)return;
  if(openRows.has(meal)){openRows.delete(meal);row.classList.remove('open');}
  else{openRows.add(meal);row.classList.add('open');}
};

function renderMealRows(meals){
  const c=document.getElementById('meal-rows');
  if(!meals.length){c.innerHTML='<div class="meal-empty-hint">사업장을 선택하면 해당 날짜의 끼니가 표시됩니다</div>';return;}
  c.innerHTML=meals.map(m=>buildMealRow(m)).join('');
}

function buildMealRow(meal){
  const site=cSite(),date=cDate(),st=getState(site,date,meal),id=esc(meal);
  const isEditing=editingMeals.has(meal),isOpen=openRows.has(meal);

  // 헤더 오른쪽
  let right='';
  if(st.submitted&&!isEditing){
    right=`<span class="badge-done"><span class="badge-dot"></span>제출완료</span><button class="btn-edit" onclick="event.stopPropagation();startEdit('${meal}')">수정</button>`;
  }

  // 헤더 썸네일
  let thumb='';
  if(st.photo){
    thumb=`<img class="meal-thumb" src="${st.photo.preview}" />`;
  } else {
    thumb=`<div class="meal-thumb-placeholder"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  }

  // 패널
  let panel='';
  if(!st.submitted||isEditing){
    const hasPhoto=!!st.photo;
    const btnClass=hasPhoto?'btn-upload has-photo':'btn-upload';
    const btnLabel=hasPhoto?'사진 변경':'사진 추가';
    const previewHtml=hasPhoto?`<div class="photo-preview-large"><img src="${st.photo.preview}"/><button class="photo-del-large" onclick="removePhoto('${meal}')">✕</button></div>`:'';
    panel=`
      <div class="photo-upload-area">
        <label class="${btnClass}">
          <svg class="upload-icon-sm" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          <span>${btnLabel}</span>
          <input type="file" accept="image/*" onchange="handleFile(this,'${meal}')"/>
        </label>
        ${previewHtml}
      </div>`;
  } else if(st.photo){
    panel=`<div class="photo-preview-large" style="margin-top:12px;"><img src="${st.photo.preview}"/></div>`;
  }

  const rowClass=['meal-row', st.submitted&&!isEditing?'submitted':st.photo?'has-photo':'', isOpen?'open':''].filter(Boolean).join(' ');
  return `<div class="${rowClass}" id="row-${id}">
    <div class="meal-row-header" onclick="toggleRow('${meal}')">
      <div class="meal-left">${thumb}<span class="meal-name">${meal}</span></div>
      <div class="meal-right">${right}<svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="meal-panel">${panel}</div>
  </div>`;
}

function refreshRow(meal){
  const id=esc(meal),el=document.getElementById('row-'+id);if(!el)return;
  const t=document.createElement('div');t.innerHTML=buildMealRow(meal);el.replaceWith(t.firstElementChild);
}

window.handleFile=function(input,meal){
  const file=input.files[0];if(!file){input.value='';return;}
  const site=cSite(),date=cDate(),st=getState(site,date,meal);
  const r=new FileReader();
  r.onload=e=>{
    st.photo={preview:e.target.result,file};
    openRows.add(meal);
    refreshRow(meal);
    updateSubmitAllBtn();
  };
  r.readAsDataURL(file);
  input.value='';
};

window.removePhoto=function(meal){
  const st=getState(cSite(),cDate(),meal);
  st.photo=null;
  refreshRow(meal);
  updateSubmitAllBtn();
};

async function uploadMeal(site,date,manager,meal){
  const st=getState(site,date,meal);
  if(!st.photo||st.submitted)return;
  const compressed=await compressImage(st.photo.file);
  const path=`submissions/${date}/${site}/${meal}/${Date.now()}.jpg`;
  const storageRef=ref(storage,path);
  await uploadBytes(storageRef,compressed);
  const url=await getDownloadURL(storageRef);
  const docId=`${manager}_${site}_${date}_${meal}`.replace(/[^a-zA-Z0-9가-힣_-]/g,'_');
  await setDoc(doc(db,'submissions',docId),{manager,site,date,meal,photoURLs:[url],submittedAt:new Date().toISOString()});
  st.submitted=true;
  st.photo={preview:url,url};
}

window.submitAll=async function(){
  const site=cSite(),date=cDate(),manager=cMgr();
  if(!manager){showToast('매니저를 먼저 선택해주세요',true);return;}
  const toSubmit=currentMeals.filter(m=>{const st=getState(site,date,m);return st.photo&&!st.submitted;});
  if(!toSubmit.length){showToast('첨부된 사진이 없어요',true);return;}

  const btn=document.getElementById('btn-submit-all');
  btn.disabled=true;

  let done=0;
  for(const meal of toSubmit){
    document.getElementById('submit-all-label').textContent=`${meal} 제출 중... (${done+1}/${toSubmit.length})`;
    try{
      await uploadMeal(site,date,manager,meal);
      done++;
      editingMeals.delete(meal);
      openRows.delete(meal);
      refreshRow(meal);
    }catch(e){
      showToast(`${meal} 제출 실패: `+e.message,true);
    }
  }
  updateSubmitAllBtn();
  showToast(`${done}개 끼니 제출 완료!`);
};

window.startEdit=function(meal){
  const site=cSite(),date=cDate(),st=getState(site,date,meal);
  st.submitted=false;
  editingMeals.add(meal);openRows.add(meal);
  refreshRow(meal);updateSubmitAllBtn();
};
window.cancelEdit=function(meal){
  const site=cSite(),date=cDate(),st=getState(site,date,meal);
  st.submitted=true;
  editingMeals.delete(meal);openRows.delete(meal);
  refreshRow(meal);updateSubmitAllBtn();
};

window.switchTab=function(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='admin')startAutoRefresh();else stopAutoRefresh();
};

function startAutoRefresh(){
  stopAutoRefresh();
  autoRefreshTimer=setInterval(async()=>{
    if(!lastAdminQuery.from||!lastAdminQuery.to)return;
    try{
      const q=query(collection(db,'submissions'),where('date','>=',lastAdminQuery.from),where('date','<=',lastAdminQuery.to));
      const snap=await getDocs(q);
      adminRecords=[];snap.forEach(d=>adminRecords.push(d.data()));
      renderAdminGrid();
      document.getElementById('refresh-status').textContent=`마지막 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;
    }catch(e){}
  },30000);
  document.getElementById('refresh-status').textContent='자동 새로고침 활성 (30초마다)';
}
function stopAutoRefresh(){if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null;}document.getElementById('refresh-status').textContent='자동 새로고침 대기 중';}

window.resetAdmin=function(){
  document.getElementById('admin-from').value=todayStr;
  document.getElementById('admin-to').value=todayStr;
  document.getElementById('admin-manager').value='';
  document.getElementById('grid-wrap').innerHTML='<div class="empty-state">날짜를 선택하고 조회해주세요</div>';
  document.getElementById('btn-download').disabled=true;
  adminRecords=[];lastAdminQuery={from:'',to:''};
};

window.loadAdminData=async function(){
  const from=document.getElementById('admin-from').value,to=document.getElementById('admin-to').value;
  if(!from||!to){showToast('날짜를 선택해주세요',true);return;}
  showLoading('데이터 불러오는 중...');
  try{
    const q=query(collection(db,'submissions'),where('date','>=',from),where('date','<=',to));
    const snap=await getDocs(q);
    adminRecords=[];snap.forEach(d=>adminRecords.push(d.data()));
    lastAdminQuery={from,to};
    renderAdminGrid();
    document.getElementById('btn-download').disabled=adminRecords.length===0;
    document.getElementById('refresh-status').textContent=`마지막 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;
  }catch(e){showToast('조회 실패: '+e.message,true);}
  hideLoading();
};

function getDates(from,to){const d=[],c=new Date(from),e=new Date(to);while(c<=e){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}

function renderAdminGrid(){
  const from=lastAdminQuery.from,to=lastAdminQuery.to;if(!from||!to)return;
  const mf=document.getElementById('admin-manager').value,wrap=document.getElementById('grid-wrap');
  const dates=getDates(from,to);
  const cols=[];dates.forEach(d=>ALL_MEALS.forEach(m=>cols.push({date:d,meal:m})));
  let sites=ALL_SITES;
  if(mf){const mg=MANAGERS.find(m=>m.name===mf);sites=mg?mg.sites:[];}
  const recMap={};
  adminRecords.forEach(r=>{recMap[`${r.site}|${r.date}|${r.meal}`]=r.photoURLs||[];});
  let html='<table class="admin-grid"><thead><tr><th class="th-site" rowspan="2">사업장</th>';
  dates.forEach((d,di)=>html+=`<th class="th-date${di>0?' date-sep':''}" colspan="${ALL_MEALS.length}">${d}</th>`);
  html+='</tr><tr>';
  dates.forEach((d,di)=>ALL_MEALS.forEach((m,mi)=>html+=`<th class="th-meal${mi===0&&di>0?' date-sep':''}">${m}</th>`));
  html+='</tr></thead><tbody>';
  sites.forEach(site=>{
    html+=`<tr><td class="td-site">${site}</td>`;
    cols.forEach((col,ci)=>{
      const sep=ALL_MEALS.indexOf(col.meal)===0&&ci>0?' date-sep':'';
      const meals=getMeals(site,col.date);
      if(!meals.includes(col.meal)){html+=`<td class="cell cell-gray${sep}"></td>`;return;}
      const key=`${site}|${col.date}|${col.meal}`;
      const urls=recMap[key];
      html+=urls&&urls.length?`<td class="cell cell-o${sep}" onmouseenter="showPreview(event,'${key}')" onmouseleave="hidePreview()"><span class="cell-symbol">O</span></td>`:`<td class="cell cell-x${sep}"><span class="cell-symbol">X</span></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

window.downloadAllPhotos=async function(){
  if(!adminRecords.length){showToast('먼저 조회해주세요',true);return;}
  let count=0;
  for(const r of adminRecords){
    for(const url of(r.photoURLs||[])){
      const a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      count++;await new Promise(res=>setTimeout(res,300));
    }
  }
  showToast(`총 ${count}장 다운로드 시작!`);
};

const prevEl=document.getElementById('hover-preview'),prevPhotos=document.getElementById('preview-photos'),prevLabel=document.getElementById('preview-label');
window.showPreview=function(e,key){
  const recMap={};adminRecords.forEach(r=>{recMap[`${r.site}|${r.date}|${r.meal}`]=r.photoURLs||[];});
  const urls=recMap[key]||[];if(!urls.length)return;
  const parts=key.split('|');
  prevLabel.textContent=`${parts[0]} · ${parts[2]}`;
  prevPhotos.innerHTML=urls.slice(0,1).map(url=>`<img class="preview-img" src="${url}" onerror="this.style.display='none'"/>`).join('');
  prevEl.classList.add('visible');movePreview(e);
};
function movePreview(e){const pw=230,ph=230;let x=e.clientX+12,y=e.clientY+12;if(x+pw>window.innerWidth)x=e.clientX-pw-8;if(y+ph>window.innerHeight)y=e.clientY-ph-8;prevEl.style.left=x+'px';prevEl.style.top=y+'px';}
document.addEventListener('mousemove',e=>{if(prevEl.classList.contains('visible'))movePreview(e);});
window.hidePreview=function(){prevEl.classList.remove('visible');};

window.setStatType=function(type){
  statType=type;
  document.querySelectorAll('.stat-type-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&type==='week')||(i===1&&type==='month')));
  loadStats();
};
window.loadStats=async function(){
  const month=document.getElementById('stat-month').value;if(!month)return;
  showLoading('통계 불러오는 중...');
  try{
    let from,to;
    if(statType==='month'){from=month+'-01';const last=new Date(month.slice(0,4),month.slice(5,7),0);to=month+'-'+String(last.getDate()).padStart(2,'0');}
    else{const now=new Date();const day=now.getDay()||7;const mon=new Date(now);mon.setDate(now.getDate()-day+1);const sun=new Date(mon);sun.setDate(mon.getDate()+6);from=mon.toISOString().split('T')[0];to=sun.toISOString().split('T')[0];}
    const q=query(collection(db,'submissions'),where('date','>=',from),where('date','<=',to));
    const snap=await getDocs(q);const records=[];snap.forEach(d=>records.push(d.data()));
    renderStats(records,from,to);
  }catch(e){showToast('통계 조회 실패',true);}
  hideLoading();
};
function renderStats(records,from,to){
  const dates=getDates(from,to);let totalRequired=0,totalSubmitted=0;const managerStats={};
  MANAGERS.forEach(mgr=>{
    let req=0,sub=0;
    mgr.sites.forEach(site=>{dates.forEach(date=>{const meals=getMeals(site,date);req+=meals.length;meals.forEach(meal=>{if(records.find(r=>r.site===site&&r.date===date&&r.meal===meal))sub++;});});});
    totalRequired+=req;totalSubmitted+=sub;
    if(req>0)managerStats[mgr.name]={req,sub,rate:Math.round(sub/req*100)};
  });
  const overallRate=totalRequired>0?Math.round(totalSubmitted/totalRequired*100):0;
  document.getElementById('stat-summary').innerHTML=`
    <div class="stat-card"><div class="stat-label">전체 제출률</div><div class="stat-value">${overallRate}%</div><div class="stat-sub">${totalSubmitted}/${totalRequired}건</div></div>
    <div class="stat-card"><div class="stat-label">제출 완료</div><div class="stat-value">${totalSubmitted}</div><div class="stat-sub">건</div></div>
    <div class="stat-card"><div class="stat-label">미제출</div><div class="stat-value">${totalRequired-totalSubmitted}</div><div class="stat-sub">건</div></div>`;
  const sorted=Object.entries(managerStats).sort((a,b)=>b[1].rate-a[1].rate);
  document.getElementById('stat-bars').innerHTML=sorted.map(([name,s])=>`
    <div class="rate-bar-wrap">
      <div class="rate-bar-label"><span>${name}</span><span>${s.rate}% (${s.sub}/${s.req})</span></div>
      <div class="rate-bar-track"><div class="rate-bar-fill" style="width:${s.rate}%"></div></div>
    </div>`).join('');
}

window.loadHistory=async function(){
  const manager=document.getElementById('history-manager').value;
  const from=document.getElementById('history-from').value;
  const to=document.getElementById('history-to').value;
  if(!manager){showToast('매니저를 선택해주세요',true);return;}
  showLoading('히스토리 불러오는 중...');
  try{
    const q=query(collection(db,'submissions'),where('manager','==',manager),where('date','>=',from),where('date','<=',to));
    const snap=await getDocs(q);const records=[];snap.forEach(d=>records.push(d.data()));
    records.sort((a,b)=>b.date.localeCompare(a.date));renderHistory(records);
  }catch(e){showToast('히스토리 조회 실패',true);}
  hideLoading();
};
function renderHistory(records){
  const el=document.getElementById('history-list');
  if(!records.length){el.innerHTML='<div class="empty-state">제출 내역이 없습니다</div>';return;}
  const groups={};
  records.forEach(r=>{const key=`${r.date}|${r.site}`;if(!groups[key])groups[key]={date:r.date,site:r.site,meals:[]};groups[key].meals.push({meal:r.meal,count:(r.photoURLs||[]).length});});
  el.innerHTML=Object.values(groups).map(g=>`
    <div class="history-card">
      <div class="history-top"><div class="history-site">${g.site}</div><div class="history-date">${g.date}</div></div>
      <div class="history-meals">${g.meals.map(m=>`<span class="history-meal-tag">${m.meal}</span>`).join('')}</div>
    </div>`).join('');
}
</script>
